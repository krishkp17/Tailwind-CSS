<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="h-full w-full flex flex-col justify-center items-center bg-slate-200">

    <div class=" bg-white shadow-md min-h-screen w-[95%]  flex flex-col md:flex-row items-center justify-evenly rounded-xl gap-3 ">

        <div class=" h-max w-full md:-[35%] flex flex-col items-center gap-8 p-5 ">
            <h2 class="text-blue-500 font-medium">WE"RE HERE TO HELP YOU </h2>
            <h1 class="text-3xl font-medium ">Discuss your Chemical <br> Solution Needs</h1>
            <p class="font-medium text-gray-400">Are you lokking for top-quality chemical solution <br> tailored to your need? Reach out to us.</p>
            <div class="flex  gap-3">
                <div><i class="fa-regular fa-envelope text-5xl bg-blue-700 rounded-md text-white "></i></div>
                <div>
                    <h1 class="font-medium">E-mail</h1>
                    <h1 class="font-medium">soluvent**@gmail.com</h1>
                </div>
            </div>
            <div class=" -ml-12 flex gap-3">
                <div><i class="fa-solid fa-phone text-5xl text-blue-700"></i></div>
                <div>
                    <h1 class="font-medium">phone number</h1>
                    <h1 class="font-medium">+123-456-7890</h1>
                </div>
            </div>
        </div>

        <div class=" h-130 w-full md:-[45%]  rounded-xl shadow-lg">
    
            <form action="" class="flex flex-col items-center justify-center h-full gap-3">
                <label for="">Name</label>
                <input type="text" class="bg-slate-200 rounded-md w-[60%] h-[40px]">
                <label for="">Email</label>
                <input type="text" class="bg-slate-200 rounded-md w-[60%] h-[40px]">
                <label for="">Industry</label>
                <select name="" id="" class="bg-slate-200 w-45 rounded-md w-[60%] h-[40px]">
                    <option value="">Select</option>
                    <option value="IT">IT</option>
                    <option value="Medical">Medical</option>
                    <option value="Management">Management</option>
                    <option value="Finance">Finance</option>
                </select>
                <label for="">Message</label>
                <input type="text" class="bg-slate-200 rounded-md w-[60%] textarea">

                <button class="bg-blue-600 rounded-3xl text-white p-3"><i class="fa-solid fa-arrow-right text-blue-600 bg-white rounded-full " ></i> Get a Solution</button>

            </form>
            

        </div>

    </div>
    
    

</body>
</html>
