<html lang="en">
<head>

<body class="h-[100vh] w-full flex justify-center items-center">

    <div class=" w-[80%] flex flex-col md:flex-row justify-center items-center shadow-lg">
    <div class="h-[700px]">
        <img class="h-full" src="../img/formside.jpeg" alt="">
    </div>

    <div class="flex flex-col justify-center p-10 gap-5">
        <h1 class="font-bold text-3xl">Welcome to Dribbble </h1>
        <p class="text-xl text-gray-400">Come on and create an account</p>
        <form action="" class="flex flex-col gap-3">
            <label for="" class="text-gray-400">Full name</label>
            <input type="text" class="border-b-3 rounded-sm border-pink-500 outline-none">
            <label for="" class="text-gray-400">Username</label>
            <input type="text"  class="border-b-3 rounded-sm border-pink-500 outline-none">
            <label for="" class="text-gray-400">Email</label>
            <input type="text"  class="border-b-3 rounded-sm border-pink-500 outline-none">
            <label for="" class="text-gray-400">Password</label>
            <input type="text"  class="border-b-3 rounded-sm border-pink-500 outline-none">
            <label for="" class="text-gray-400">Confirm Password</label>
            <input type="password"  class="border-b-3 rounded-sm border-pink-500 outline-none">
            <div class="flex gap-2">
                <input type="checkbox" name="" id="">
                <p>I agree with the website's <span class="text-pink-600 font-medium">Tearm and conditions</span> </p>
            </div>
            <input type="button" value="Sign in" class="w-full p-2 rounded-3xl bg-pink-500 shadow-md">
            <p>Alreday a member? <span class="text-pink-600 font-medium">Sign up</span> </p>
        </form>
        
    </div>
    </div>
